syntax = "proto3";

package protocol;

option go_package = "github.com/Home/galaxy-mmo/pkg/protocol;protocol";

enum PacketType {
  PACKET_UNKNOWN = 0;
  
  // Client to Server
  C_AUTH_REQUEST = 1;
  C_MOVE_INPUT = 2;
  C_SHOOT_INPUT = 3;
  C_MINE_INPUT = 4;
  C_DOCK_INPUT = 5;
  C_BUY_INPUT = 6;
  C_SELL_INPUT = 7;
  C_PING = 8;

  // Server to Client
  S_AUTH_RESPONSE = 9;
  S_WORLD_SNAPSHOT = 10;
  S_DELTA_SNAPSHOT = 11;
  S_DAMAGE_EVENT = 12;
  S_DEATH_EVENT = 13;
  S_CHAT_MESSAGE = 14;
  S_MARKET_DATA = 15;
  S_INVENTORY_UPDATE = 16;
  S_PONG = 17;

  // Corporations & Production (added in Phase 3)
  C_CREATE_CORP_REQUEST = 18;
  S_CREATE_CORP_RESPONSE = 19;
  C_INVITE_CORP_REQUEST = 20;
  C_JOIN_CORP_REQUEST = 21;
  C_START_REFINE_REQUEST = 22;
  C_BUILD_SHIP_REQUEST = 23;
  C_VAULT_ACTION = 24;
  S_VAULT_STATUS = 25;
  C_JOIN_COMBAT_REQUEST = 26;

  // Phase 1.5 fleet tactics
  C_SET_FLEET_TACTICS = 27;
  S_FLEET_STATUS = 28;

  // Phase 2 hangar / refit
  C_GET_HANGAR = 29;
  S_HANGAR_DATA = 30;
  C_FIT_SHIP = 31;

  // Phase 3 production / crafting
  C_CRAFT_RECIPE = 32;
  S_PRODUCTION_STATUS = 33;

  // Phase 3 skills / progression
  S_PLAYER_PROGRESS = 34;

  // Phase 3 research
  C_START_RESEARCH = 35;
  S_RESEARCH_STATUS = 36;

  // Phase 5 space bases
  C_BUILD_BASE = 37;
  C_UPGRADE_BASE = 38;

  // Phase 5 planets
  C_DEVELOP_PLANET = 39;

  // Inventory: jettison cargo into space as a loot container
  C_JETTISON_INPUT = 40;

  // Context actions on a selected object (server-driven action list)
  C_QUERY_ACTIONS = 41;
  S_TARGET_ACTIONS = 42;
  C_ATTACK_NPC_REQUEST = 43;
  C_SET_FOLLOW = 44;
  C_HAIL = 45;
  S_HAIL_RESPONSE = 46;

  // Scan a loot container to reveal its contents
  C_SCAN_CONTAINER = 47;
  S_CONTAINER_CONTENTS = 48;

  // Pre-battle fleet formation (rank/column battle line)
  C_SET_FLEET_FORMATION = 49;

  // Colony overview (owned space bases + developed planets)
  C_GET_COLONIES = 50;
  S_COLONIES_STATUS = 51;
}

message Packet {
  uint32 sequence = 1;
  uint32 ack = 2;
  uint32 ack_bitfield = 3;
  PacketType type = 4;
  bytes payload = 5;
}

// Client Messages
message AuthRequest {
  string login = 1;
  string password = 2;
}

message MoveInput {
  float x = 1;
  float y = 2;
}

message ShootInput {
  bool active = 1;
  uint64 target_id = 2;
}

message MineInput {
  bool active = 1;
  uint64 target_id = 2;
}

message DockInput {
  uint64 station_id = 1;
}

message BuyInput {
  string resource = 1;
  int32 amount = 2;
  uint64 station_id = 3;
}

message SellInput {
  string resource = 1;
  int32 amount = 2;
  uint64 station_id = 3;
}

message Ping {
  double timestamp = 1;
}

// Server Messages
message AuthResponse {
  bool success = 1;
  string session_token = 2;
  uint64 entity_id = 3;
  string error_message = 4;
}

message EntitySnapshot {
  uint64 entity_id = 1;
  uint32 entity_type = 2; // matches domain.EntityType
  float x = 3;
  float y = 4;
  float rotation = 5;
  float vx = 6;
  float vy = 7;
  int32 hp = 8;
  int32 max_hp = 9;
  int32 shield = 10;
  int32 max_shield = 11;
  string name = 12;
  uint32 faction_id = 13;
  uint32 corp_id = 14;
  uint64 target_id = 15;
  bool is_shooting = 16;
  bool is_mining = 17;
  bool refinery_active = 18;
  int32 shipyard_queue_len = 19;
  string ship_type = 20;
  int32 price_iron = 21;
  int32 price_titanium = 22;
  int32 price_crystal = 23;
  int32 qty_iron = 24;
  int32 qty_titanium = 25;
  int32 qty_crystal = 26;
  int32 qty_iron_plates = 27;
  int32 qty_titanium_plates = 28;
  int32 cargo_capacity = 29;
  int32 cargo_load = 30;
  int64 credits = 31;
  int32 qty_silicon_wafers = 32;
  int32 qty_fuel_cells = 33;
  int32 qty_microchips = 34;
  int32 qty_energy_coils = 35;
  int32 qty_laser_cannon = 36;
  int32 qty_mining_laser = 37;
  // Phase 1 Starsector combat fields
  int32 armor = 38;
  int32 max_armor = 39;
  int32 flux = 40;
  int32 max_flux = 41;
  bool overloaded = 42;
  bool venting = 43;
  string last_damage_type = 44; // type of the most recent damage taken (client damage-number color)
  int32 shots_fired = 45;       // weapon mounts that fired this tick (beam intensity)
  // Phase 1.5 roles & tactics
  string role = 46;              // tank | dps | support | repair
  string strategy = 47;          // attack | defense | retreat
  uint64 assist_target_id = 48;  // ally being repaired/supported this tick
  string assist_type = 49;       // "repair" | "support" (for the assist beam color)
  // Phase 5 space bases
  int32 base_level = 50;         // level of a SpaceBase entity
  // Directional shields (combat): arc coverage in degrees (>=360 = omni/full bubble) and the
  // world-space heading the shield is held toward (radians). For client shield-arc rendering.
  float shield_arc = 51;
  float shield_facing = 52;
  // Missile subsystem hits (Phase B4): true while this ship's engines/weapons are knocked out.
  bool engine_hit = 53;
  bool weapon_hit = 54;
  // Overload lockout remaining (Phase D): seconds left on a fixed-duration overload (0 = not
  // overloaded). Lets the client show an overload countdown rather than just a boolean.
  float overload_timer = 55;
}

// FireEvent (Phase B3): a weapon discharged a traveling shot this tick. Damage is applied
// authoritatively/instantly by the server; this is a thin-channel cosmetic hint so the client can
// draw the bolt flying from (origin) toward (target). Streamed inside the tick snapshot.
message FireEvent {
  uint64 attacker_id = 1;
  uint64 target_id = 2;
  float origin_x = 3;
  float origin_y = 4;
  float target_x = 5;
  float target_y = 6;
  float speed = 7;         // world units/sec (client flight speed)
  string damage_type = 8;  // KINETIC | EXPLOSIVE | ENERGY | FRAGMENTATION (bolt tint)
  string weapon_class = 9; // "projectile" (beam/missile later)
}

// MissileState (Phase B4): authoritative position of a live flying missile in a combat instance.
// Thin channel — a handful of fields per missile, streamed each tick so the client can render true
// missile positions and honest interception (a missile that vanishes from the list was shot down or
// hit). Separate from EntitySnapshot so missiles don't go through the ship-rendering path.
message MissileState {
  uint64 id = 1;
  float x = 2;
  float y = 3;
  float rotation = 4;
  string damage_type = 5;
}

message WorldSnapshot {
  uint64 tick = 1;
  repeated EntitySnapshot entities = 2;
  repeated FireEvent fire_events = 3; // weapon discharges this tick (combat instances only)
  repeated MissileState missiles = 4; // live flying missiles this tick (combat instances only)
}

message DeltaSnapshot {
  uint64 tick = 1;
  repeated EntitySnapshot updated_entities = 2;
  repeated uint64 destroyed_entities = 3;
}

message DamageEvent {
  uint64 attacker_id = 1;
  uint64 target_id = 2;
  int32 damage = 3;
  bool is_killed = 4;
}

message DeathEvent {
  uint64 entity_id = 1;
}

message ChatMessage {
  string sender = 1;
  string message = 2;
}

message MarketItem {
  string resource = 1;
  int32 price = 2;
  int32 stock = 3;
}

message MarketData {
  repeated MarketItem items = 1;
}

message ItemInstanceProto {
  uint64 id = 1;
  uint32 definition_id = 2;
  int32 quantity = 3;
  string location_type = 4;
  uint64 location_id = 5;
  uint64 owner_id = 6;
  string state = 7;
  string name = 8;
  string category = 9;
  bool stackable = 10;
  float volume = 11;
  string meta_data_json = 12;
}

message InventoryUpdate {
  int64 credits = 1;
  repeated ItemInstanceProto cargo = 2;
}

message Pong {
  double timestamp = 1;
}

message ServerCommand {
  uint64 player_id = 1;
  PacketType type = 2;
  bytes payload = 3;
}

message FleetShipProto {
  uint32 ship_id = 1;
  string ship_type = 2;
  int32 health = 3;
  int32 max_health = 4;
  int32 shield = 5;
  int32 max_shield = 6;
  int32 cargo_capacity = 7;
  string role = 8;     // Phase 1.5 per-ship tactics
  string strategy = 9;
  // Phase 2 per-ship loadout
  bool customized = 10;
  uint32 hull_id = 11;
  map<string, string> fitted_weapons = 12; // slot_id -> weapon_id
  repeated string fitted_hullmods = 13;
  int32 vents = 14;
  int32 capacitors = 15;
}

// Phase 1.5: player assigns role/strategy per ship before battle.
message FleetShipTactics {
  uint32 ship_id = 1;
  string role = 2;     // tank | dps | support | repair
  string strategy = 3; // attack | defense | retreat
}

message SetFleetTactics {
  repeated FleetShipTactics ships = 1;
}

// Server pushes the player's fleet roster (with current tactics + loadout) to the client.
message FleetStatusShip {
  uint32 ship_id = 1;
  string ship_type = 2;
  int32 health = 3;
  int32 max_health = 4;
  int32 shield = 5;
  int32 max_shield = 6;
  string role = 7;
  string strategy = 8;
  // Phase 2: effective loadout + baked preview so the hangar can render this ship.
  uint32 hull_id = 9;
  map<string, string> fitted_weapons = 10; // slot_id -> weapon_id
  repeated string fitted_hullmods = 11;
  int32 vents = 12;
  int32 capacitors = 13;
  int32 op_used = 14;
  int32 op_total = 15;
  float preview_hp = 16;
  float preview_armor = 17;
  float preview_shield = 18;
  float preview_max_speed = 19;
  float preview_max_flux = 20;
  float preview_flux_dissipation = 21;
  // Pre-battle formation slot (client renders the battle-line grid from these).
  int32 formation_rank = 22;
  int32 formation_col = 23;
}

message FleetStatus {
  repeated FleetStatusShip ships = 1;
}

// Client sets the pre-battle fleet formation (battle-line rank/column per ship).
// The server reorders the fleet by (rank, col) so the front-left ship leads (flagship),
// and spawns each ship at its rank/column offset when a combat instance unpacks the fleet.
message FleetFormationSlot {
  uint32 ship_id = 1;
  int32 rank = 2; // 0 = vanguard (front), higher = further back
  int32 col = 3;  // 0..5 lateral column
}

message SetFleetFormation {
  repeated FleetFormationSlot slots = 1;
}

// One player-owned colony (space base or developed planet) for the colony overview screen.
message ColonyEntry {
  uint64 entity_id = 1;
  string kind = 2;        // "base" | "planet"
  int32 level = 3;        // base level / planet development level
  float x = 4;
  float y = 5;
  int32 health = 6;       // bases only (0 for planets)
  int32 max_health = 7;
  int64 income = 8;       // passive yield per production cycle
  string income_unit = 9; // "IronPlates" | "cr"
  uint32 system_id = 10;
}

message ColoniesStatus {
  repeated ColonyEntry colonies = 1;
}

// Phase 2 hangar catalog (available hulls / weapons / hullmods).
message WeaponSlotProto {
  string slot_id = 1;
  string size = 2;
  string type = 3;
  string mount = 4;
}

message HullDefProto {
  uint32 id = 1;
  string hull_id = 2;
  string name = 3;
  float base_hp = 4;
  float base_armor = 5;
  float base_shield_max = 6;
  float base_max_speed = 7;
  int32 ordnance_points = 8;
  string size_class = 9;
  repeated WeaponSlotProto slots = 10;
}

message WeaponDefProto {
  string weapon_id = 1;
  string name = 2;
  string weapon_type = 3;
  string weapon_size = 4;
  int32 op_cost = 5;
  float damage_per_shot = 6;
  string damage_type = 7;
  float flux_cost = 8;
  float range = 9;
  float cooldown = 10;
  string module_item = 11; // Phase 4: cargo item required to fit this weapon ("" = basic/free)
}

message HullmodDefProto {
  string mod_id = 1;
  string name = 2;
  map<string, int32> op_cost_by_size = 3;
}

message HangarData {
  repeated HullDefProto hulls = 1;
  repeated WeaponDefProto weapons = 2;
  repeated HullmodDefProto hullmods = 3;
  map<string, int32> owned_modules = 4; // Phase 4: module item -> count in the player's cargo
}

// Client requests a refit of a single ship; server validates + applies + echoes S_FLEET_STATUS.
message FitShipRequest {
  uint32 ship_id = 1;
  map<string, string> fitted_weapons = 2; // slot_id -> weapon_id ("" clears a slot)
  repeated string fitted_hullmods = 3;
  int32 vents = 4;
  int32 capacitors = 5;
}

message PlayerMigrationPayload {
  uint64 player_id = 1;
  float x = 2;
  float y = 3;
  float rotation = 4;
  float vx = 5;
  float vy = 6;
  int32 hp = 7;
  int32 max_hp = 8;
  int32 shield = 9;
  int32 max_shield = 10;
  float shield_regen_rate = 11;
  string weapon_type = 12;
  int32 weapon_damage = 13;
  float weapon_range = 14;
  float weapon_cooldown = 15;
  int32 cargo_capacity = 16;
  repeated ItemInstanceProto cargo_items = 17;
  float mining_power = 18;
  float mining_range = 19;
  string ship_type = 20;
  float max_speed = 21;
  float turn_rate = 22;
  uint64 account_id = 23;
  string player_name = 24;
  int64 credits = 25;
  string session_id = 26;
  uint32 faction_id = 27;
  bool is_npc = 28;
  string ai_behavior = 29;
  uint64 ai_target_id = 30;
  repeated FleetShipProto fleet_ships = 31;
  repeated SkillProto skills = 32;            // Phase 3: carry progression across jump gates
  repeated string completed_research = 33;    // Phase 3: carry completed research across jump gates
}

message SystemTransferRequest {
  uint64 player_id = 1;
  uint32 target_system_id = 2;
  float spawn_x = 3;
  float spawn_y = 4;
  PlayerMigrationPayload payload = 5;
}

message SystemTransferResponse {
  uint64 player_id = 1;
  bool success = 2;
  string error_message = 3;
}

message CreateCorpRequest {
  string name = 1;
}

message CreateCorpResponse {
  bool success = 1;
  uint32 corp_id = 2;
  string error_message = 3;
}

message InviteCorpRequest {
  uint64 invitee_id = 1;
}

message JoinCorpRequest {
  uint32 corp_id = 1;
}

message StartRefineRequest {
  uint64 station_id = 1;
  string resource_type = 2;
  int32 amount = 3;
}

message BuildShipRequest {
  uint64 station_id = 1;
  string ship_type = 2;
}

message VaultAction {
  uint64 station_id = 1;
  string resource = 2;
  int32 amount = 3;
  string vault_type = 4;  // "personal" or "corporate"
  string action_type = 5; // "deposit" or "withdraw"
}

message VaultStatus {
  uint64 station_id = 1;
  repeated ItemInstanceProto personal_items = 2;
  repeated ItemInstanceProto corporate_items = 3;
}

message JoinCombatRequest {
  uint32 combat_instance_id = 1;
  uint64 align_with_fleet_id = 2; // 0 for FFA (free for all)
  string side = 3;                // "attacker" | "defender" | "" — server resolves the fleet id from the marker
}

// Phase 3: data-driven crafting.
message CraftRecipeRequest {
  string recipe_id = 1;
}

message RecipeProto {
  string id = 1;
  string name = 2;
  int32 tier = 3;
  map<string, int32> inputs = 4;
  map<string, int32> outputs = 5;
  float time_seconds = 6;
  bool locked = 7;               // true if gated by research the player hasn't completed
  string required_research = 8;  // research project ID gating this recipe ("" = none)
}

message CraftJobProto {
  string recipe_id = 1;
  string name = 2;
  float progress = 3;
  float total_time = 4;
}

message ProductionStatus {
  repeated CraftJobProto queue = 1;
  repeated RecipeProto recipes = 2; // the craftable catalog (for the picker)
}

// Phase 3: skills / progression.
message SkillProto {
  string key = 1;     // mining | engineering | combat
  int32 level = 2;
  int32 xp = 3;       // progress toward next level
  int32 xp_next = 4;  // XP needed for the next level
}

message PlayerProgressMsg {
  repeated SkillProto skills = 1;
}

// Phase 3: research.
message StartResearchRequest {
  string project_id = 1;
}

message ResearchProjectProto {
  string id = 1;
  string name = 2;
  int64 cost = 3;
  float time_seconds = 4;
  repeated string prereqs = 5;
  repeated string unlocks = 6;
  string status = 7;     // locked | available | active | completed
  float progress = 8;    // for the active project
  float total_time = 9;  // for the active project
}

message ResearchStatus {
  repeated ResearchProjectProto projects = 1;
}

// Phase 5: space bases.
message BuildBaseRequest {
  // Built at the player's current position; no fields needed.
}

message UpgradeBaseRequest {
  uint64 base_id = 1;
}

message DevelopPlanetRequest {
  uint64 planet_id = 1;
}

// Eject a quantity of a cargo resource into space as a loot container.
message JettisonInput {
  string resource = 1;
  int32 amount = 2;
}

// Context actions: client asks "what can I do with this object", server replies
// with a data-driven list (single source of truth for action availability).
message QueryActionsRequest {
  uint64 target_id = 1;
}

message ActionDef {
  string id = 1;      // verb: mine | attack | escort | talk | upgrade_base | develop_planet | join_combat | buy | sell | refine | build_ship | dock
  string label = 2;   // display label
  bool enabled = 3;   // greyed out when false
  string hint = 4;    // tooltip / reason it is disabled
}

message TargetActions {
  uint64 target_id = 1;
  repeated ActionDef actions = 2;
}

// Player-initiated combat: spin up an instance against this NPC.
message AttackNpcRequest {
  uint64 target_id = 1;
}

// Follow/escort order: the player's ship follows the target at a standoff.
// target_id = 0 cancels the current follow order.
message SetFollowRequest {
  uint64 target_id = 1;
}

// Minimal hail/talk stub.
message HailRequest {
  uint64 target_id = 1;
}

message HailResponse {
  uint64 target_id = 1;
  string name = 2;
  string faction = 3;
  string disposition = 4; // friendly | neutral | hostile
  repeated string lines = 5;
}

// Scan a loot container to reveal its contents before collecting.
message ScanContainerRequest {
  uint64 target_id = 1;
}

message ContainerContents {
  uint64 target_id = 1;
  string name = 2;
  int64 credits = 3;
  repeated ItemInstanceProto items = 4;
}
