version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: galaxy-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: galaxy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: galaxy-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  nats:
    image: nats:2.10-alpine
    container_name: galaxy-nats
    restart: always
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  postgres_data:
  redis_data:
